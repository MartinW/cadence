name: Cadence
options:
  bundleIdPrefix: com.eva
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
targets:
  Cadence:
    type: application
    platform: iOS
    sources:
      - path: Cadence
        excludes:
          - "Cadence-Secrets.xcconfig"
          - "Cadence-Secrets.xcconfig.example"
          - "Info.plist"
    configFiles:
      Debug: Cadence/Cadence-Secrets.xcconfig
      Release: Cadence/Cadence-Secrets.xcconfig
    settings:
      base:
        PRODUCT_NAME: Cadence
        PRODUCT_BUNDLE_IDENTIFIER: com.eva.cadence
        INFOPLIST_FILE: Cadence/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
